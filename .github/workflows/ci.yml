name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Run playtest bot
      run: python playtest_bot.py
    - name: Build executable
      run: python -m PyInstaller main.spec
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: SnakeGradient-windows
        path: dist/SnakeGradient.exe
        retention-days: 7

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: pip install -r requirements.txt
    - name: Check syntax
      run: python -m py_compile main.py states/*.py entities.py ui.py config.py game_assets.py save_manager.py localization_manager.py analytics_manager.py
